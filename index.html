<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>💖 漢字テスト 5年生 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@300;400;500;700;800&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff0f5;
  --card: #ffffff;
  --card2: #fff5f8;
  --accent: #ff69b4;
  --accent2: #ff85c8;
  --green: #50d4a0;
  --blue: #a78bfa;
  --text: #4a3048;
  --text2: #b08aab;
  --border: #f5d0e8;
  --correct: #50d4a0;
  --wrong: #ff6b8a;
  --radius: 20px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
button, select { -webkit-appearance:none; -moz-appearance:none; appearance:none; }
html,body { 
  background: var(--bg); color: var(--text); 
  font-family: 'M PLUS Rounded 1c','Zen Maru Gothic',sans-serif;
  height:100%; overflow:hidden; touch-action:manipulation;
}
#app { height:100%; display:flex; flex-direction:column; }

/* ─── Header ─── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; background:linear-gradient(90deg,#fff0f5,#fff5ff,#f0f0ff);
  border-bottom:2px solid #f5d0e8; flex-shrink:0;
  min-height:52px;
}
.header h1 { font-size:16px; font-weight:700; letter-spacing:1px; color:#d6368b; }
.header .subtitle { font-size:10px; color:var(--text2); }

/* ─── Navigation ─── */
.nav {
  display:flex; background:linear-gradient(90deg,#fff0f5,#fff5ff,#f0f0ff); border-top:2px solid #f5d0e8;
  flex-shrink:0; position:relative; z-index:10;
}
.nav button {
  flex:1; padding:10px 4px 8px; background:none; border:none; color:var(--text2);
  font-size:10px; font-family:inherit; display:flex; flex-direction:column;
  align-items:center; gap:3px; cursor:pointer; transition:color .2s;
}
.nav button.active { color:#ff69b4; }
.nav button svg { width:22px; height:22px; }

/* ─── Pages ─── */
.page { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; display:none; }
.page.active { display:flex; flex-direction:column; }

/* ─── Home Page ─── */
.home-hero {
  padding:32px 20px; text-align:center;
  background: linear-gradient(135deg, #ffd1e8 0%, #e8d5f5 50%, #d5e8ff 100%);
  position:relative; overflow:hidden;
}
.home-hero::before {
  content:'✨🎀💖⭐🌸💫🎀✨💖🌟';
  position:absolute; top:8px; left:0; right:0;
  font-size:14px; letter-spacing:8px; text-align:center;
  animation: sparkleScroll 8s linear infinite; opacity:.6;
}
.home-hero::after {
  content:'🌸💖✨⭐🎀💫🌟💖🌸✨';
  position:absolute; bottom:8px; left:0; right:0;
  font-size:14px; letter-spacing:8px; text-align:center;
  animation: sparkleScroll 10s linear infinite reverse; opacity:.6;
}
@keyframes sparkleScroll {
  0% { transform:translateX(-20px); }
  100% { transform:translateX(20px); }
}
.home-hero h2 { font-size:28px; font-weight:900; margin-bottom:8px; color:#d6368b; }
.home-hero .kanji-display { font-size:64px; font-weight:900; color:#ff69b4; margin:16px 0; line-height:1; text-shadow:2px 2px 0 #ffd1e8; }
.home-hero p { color:var(--text2); font-size:13px; }

.home-cards { padding:16px; display:flex; flex-direction:column; gap:12px; }
.home-card {
  background:var(--card2); border-radius:var(--radius); padding:20px;
  display:flex; align-items:center; gap:16px; cursor:pointer;
  border:2px solid var(--border); transition:transform .15s, border-color .15s;
  box-shadow:0 4px 15px rgba(255,105,180,.1);
}
.home-card:active { transform:scale(.97); border-color:var(--accent); }
.home-card .icon {
  width:48px; height:48px; border-radius:12px; display:flex;
  align-items:center; justify-content:center; font-size:22px; flex-shrink:0;
}
.home-card .icon.orange { background:rgba(255,105,180,.15); }
.home-card .icon.red { background:rgba(167,139,250,.15); }
.home-card .icon.green { background:rgba(80,212,160,.15); }
.home-card .info h3 { font-size:15px; font-weight:700; margin-bottom:3px; }
.home-card .info p { font-size:12px; color:var(--text2); }

/* ─── Test Page ─── */
.test-header {
  padding:12px 16px; background:linear-gradient(90deg,#fff5f8,#fff0ff);
  border-bottom:2px solid #f5d0e8; flex-shrink:0;
}
.test-progress {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
}
.test-progress .bar { flex:1; height:6px; background:#f5d0e8; border-radius:3px; overflow:hidden; }
.test-progress .bar-fill { height:100%; background:linear-gradient(90deg,#ff69b4,#a78bfa); border-radius:3px; transition:width .3s; }
.test-progress .count { font-size:12px; color:var(--text2); white-space:nowrap; }

.question-area {
  padding:20px 16px; flex-shrink:0;
}
.question-num { font-size:12px; color:var(--accent); font-weight:700; margin-bottom:4px; }
.question-sentence {
  font-size:20px; font-weight:700; line-height:1.6; margin-bottom:8px;
}
.question-sentence .blank {
  color:var(--accent); border-bottom:2px dashed var(--accent);
  padding:0 2px;
}
.question-hint { font-size:13px; color:var(--text2); }

/* Canvas Area */
.canvas-wrapper {
  margin:0 16px; position:relative; flex-shrink:0;
}
.canvas-container {
  background:#fff; border-radius:var(--radius);
  border:3px dashed #ffb3d9; position:relative; overflow:hidden;
  box-shadow:0 4px 15px rgba(255,105,180,.12);
}
.canvas-container canvas {
  display:block; touch-action:none;
}
.canvas-grid {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; opacity:.15;
}
.canvas-actions {
  display:flex; gap:8px; margin-top:10px; padding:0 0 4px;
}
.canvas-actions button {
  flex:1; padding:12px; border-radius:50px; border:none;
  font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
}
.btn-clear { background:#fff0f5 !important; color:#d6368b !important; border:2px solid #f5d0e8 !important; }
.btn-check { background:#ff69b4 !important; color:#fff !important; }
.btn-next { background:#a78bfa !important; color:#fff !important; }
.btn-correct { background:#50d4a0 !important; color:#fff !important; }
.btn-wrong { background:#ff6b8a !important; color:#fff !important; }

/* Answer Display */
.answer-panel {
  margin:12px 16px; padding:20px; background:#fff;
  border-radius:var(--radius); border:2px solid #f5d0e8;
  box-shadow:0 4px 15px rgba(255,105,180,.1);
  display:none;
}
.answer-panel.show { display:block; }
.answer-panel .answer-kanji {
  font-size:56px; font-weight:900; text-align:center;
  margin-bottom:12px; line-height:1.2;
  font-family:'Noto Serif JP',serif;
}
.answer-panel .answer-kanji.correct-color { color:var(--correct); }
.answer-panel .answer-kanji.wrong-color { color:var(--wrong); }
.answer-panel .answer-reading {
  text-align:center; font-size:14px; color:var(--text2); margin-bottom:16px;
}
.answer-detail {
  background:rgba(255,105,180,.05); border-radius:12px; padding:14px;
  margin-bottom:12px; border:1px solid #f5d0e8;
}
.answer-detail h4 {
  font-size:11px; color:#ff69b4; font-weight:700;
  margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;
}
.answer-detail p { font-size:14px; line-height:1.6; }
.answer-detail .stroke-order {
  font-size:40px; text-align:center; margin:8px 0;
  letter-spacing:12px; font-weight:400;
  font-family:'Noto Serif JP',serif;
}

.judge-buttons {
  display:flex; gap:8px; margin-top:12px;
}
.judge-buttons button {
  flex:1; padding:14px; border-radius:50px; border:none;
  font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;
  -webkit-appearance:none;
}

/* ─── History Page ─── */
.history-section { padding:16px; }
.history-section h3 { font-size:16px; font-weight:700; margin-bottom:12px; }
.history-item {
  background:#fff; border-radius:16px; padding:14px 16px;
  margin-bottom:8px; border:2px solid #f5d0e8;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; box-shadow:0 3px 10px rgba(255,105,180,.06);
}
.history-item:active { border-color:var(--accent); }
.history-item .hi-info h4 { font-size:14px; font-weight:600; }
.history-item .hi-info p { font-size:11px; color:var(--text2); margin-top:2px; }
.history-item .hi-score { text-align:right; }
.history-item .hi-score .score { font-size:20px; font-weight:900; }
.history-item .hi-score .score.good { color:var(--correct); }
.history-item .hi-score .score.bad { color:var(--wrong); }
.history-item .hi-score .total { font-size:11px; color:var(--text2); }

.empty-state {
  text-align:center; padding:48px 20px; color:var(--text2);
}
.empty-state .emoji { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ─── Stats Page ─── */
.stats-overview {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  padding:16px;
}
.stat-box {
  background:#fff; border-radius:16px; padding:14px 10px;
  text-align:center; border:2px solid #f5d0e8;
  box-shadow:0 3px 10px rgba(255,105,180,.08);
}
.stat-box .stat-num { font-size:24px; font-weight:900; }
.stat-box .stat-num.green { color:var(--correct); }
.stat-box .stat-num.red { color:var(--wrong); }
.stat-box .stat-num.blue { color:var(--blue); }
.stat-box .stat-label { font-size:10px; color:var(--text2); margin-top:4px; }

.kanji-stats-list { padding:0 16px 16px; }
.kanji-stats-list h3 { font-size:16px; font-weight:700; margin:16px 0 12px; }

.kanji-stat-item {
  background:#fff; border-radius:16px; padding:12px 16px;
  margin-bottom:6px; border:2px solid #f5d0e8;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 3px 10px rgba(255,105,180,.06);
}
.kanji-stat-item .ks-kanji { 
  font-size:28px; font-weight:900; width:44px; text-align:center; flex-shrink:0;
}
.kanji-stat-item .ks-info { flex:1; }
.kanji-stat-item .ks-info .ks-reading { font-size:12px; color:var(--text2); }
.kanji-stat-item .ks-info .ks-bar {
  height:6px; background:var(--border); border-radius:3px; margin-top:4px;
  overflow:hidden;
}
.kanji-stat-item .ks-info .ks-bar-fill { height:100%; border-radius:3px; }
.kanji-stat-item .ks-counts { text-align:right; font-size:12px; white-space:nowrap; }
.kanji-stat-item .ks-counts .c-correct { color:var(--correct); }
.kanji-stat-item .ks-counts .c-wrong { color:var(--wrong); }

.review-btn {
  margin:12px 16px 24px; padding:14px; border-radius:50px; border:none;
  background:#a78bfa !important; color:#fff !important; font-family:inherit;
  font-size:15px; font-weight:700; cursor:pointer; width:calc(100% - 32px);
  box-shadow:0 4px 15px rgba(167,139,250,.3);
}
.review-btn:disabled { opacity:.4; }

/* ─── Settings / Config ─── */
.config-section { padding:16px; }
.config-section h3 { font-size:16px; font-weight:700; margin-bottom:12px; }
.config-option {
  background:var(--card2); border-radius:12px; padding:14px 16px;
  margin-bottom:8px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.config-option label { font-size:14px; }
.config-option select, .config-option input {
  background:var(--border); border:none; color:var(--text);
  padding:6px 10px; border-radius:8px; font-family:inherit; font-size:14px;
}
.danger-btn {
  margin-top:16px; padding:12px; border-radius:50px; border:2px solid #ff6b8a;
  background:transparent !important; color:#ff6b8a !important; font-family:inherit;
  font-size:14px; font-weight:600; cursor:pointer; width:100%;
}

/* ─── Test Setup Modal ─── */
.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.7); z-index:100; display:none;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:#fff; border-radius:24px 24px 0 0; width:100%;
  max-width:500px; padding:24px 20px 32px; max-height:80vh; overflow-y:auto;
  border-top:3px solid #ffb3d9;
}
.modal h3 { font-size:18px; font-weight:700; margin-bottom:16px; text-align:center; color:#d6368b; }
.modal .setup-option {
  background:var(--card2); border-radius:12px; padding:14px 16px;
  margin-bottom:8px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal .setup-option label { font-size:14px; }
.modal .setup-option select {
  background:var(--border); border:none; color:var(--text);
  padding:8px 12px; border-radius:8px; font-family:inherit; font-size:14px;
}
.modal .start-btn {
  width:100%; padding:16px; border-radius:50px; border:none;
  background:#ff69b4 !important; color:#fff !important; font-family:inherit;
  font-size:16px; font-weight:900; cursor:pointer; margin-top:12px;
  box-shadow:0 4px 15px rgba(255,105,180,.3);
}
.modal .cancel-btn {
  width:100%; padding:12px; border:none; background:none;
  color:var(--text2); font-family:inherit; font-size:14px; cursor:pointer;
  margin-top:4px;
}

/* Page selector checkboxes */
.page-select { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 12px; }
.page-select label {
  background:var(--card2); border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px;
}
.page-select input:checked + span { color:var(--accent); font-weight:700; }
.page-select input { accent-color:var(--accent); }

/* Scroll */
::-webkit-scrollbar { width:0; }

/* Animation */
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn .3s ease; }

/* ─── iPad / Tablet ─── */
@media (min-width: 600px) {
  .test-header, .question-area, .canvas-wrapper, .answer-panel {
    max-width:520px; margin-left:auto; margin-right:auto;
  }
  .canvas-wrapper { padding:0; }
  .question-area { padding:24px 0; }
  .test-header { padding:14px 0; }
  .answer-panel { margin-left:auto; margin-right:auto; }
  .home-hero h2 { font-size:36px; }
  .home-hero .kanji-display { font-size:80px; }
  .home-cards { max-width:520px; margin:0 auto; }
  .history-section, .config-section { max-width:520px; margin:0 auto; }
  .stats-overview { max-width:520px; margin:0 auto; }
  .kanji-stats-list { max-width:520px; margin:0 auto; }
  .question-sentence { font-size:24px; }
  .canvas-actions button { padding:16px; font-size:16px; }
  .judge-buttons button { padding:16px; font-size:17px; }
  .answer-panel .answer-kanji { font-size:64px; }
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>🎀 漢字テスト</h1>
      <div class="subtitle" style="color:#b08aab">5年生 ドリル</div>
    </div>
    <div style="font-size:12px;color:var(--text2)" id="headerInfo"></div>
  </div>

  <!-- Pages -->
  <div class="page active" id="pageHome">
    <div class="home-hero">
      <div class="kanji-display">漢</div>
      <h2>💖 5年生 漢字テスト 💖</h2>
      <p style="color:#b06898">全290問・手書きで漢字を練習しよう 🌸</p>
    </div>
    <div class="home-cards">
      <div class="home-card" onclick="openTestSetup('normal')">
        <div class="icon orange">📝</div>
        <div class="info">
          <h3>🎀 テストを始める</h3>
          <p>ランダムに出題・手書きで解答</p>
        </div>
      </div>
      <div class="home-card" onclick="openTestSetup('review')">
        <div class="icon red">🔄</div>
        <div class="info">
          <h3>💫 間違えた問題を復習（全体）</h3>
          <p id="reviewCount">間違えた問題をまとめてテスト</p>
        </div>
      </div>
      <div id="perPageReview" style="display:none">
        <div style="padding:0 16px 4px;font-size:13px;color:#b08aab;font-weight:700">🌸 回ごとの復習</div>
      </div>
      <div class="home-card" onclick="openTestSetup('worst')">
        <div class="icon green">⭐</div>
        <div class="info">
          <h3>🌟 苦手な漢字を特訓</h3>
          <p id="worstCount">間違いの多い漢字を集中練習</p>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="pageTest">
    <div class="test-header">
      <div class="test-progress">
        <div class="bar"><div class="bar-fill" id="progressBar" style="width:0%"></div></div>
        <div class="count" id="progressCount">0/0</div>
      </div>
      <div class="question-num" id="questionLabel"></div>
    </div>
    <div class="question-area">
      <div class="question-sentence" id="questionText"></div>
      <div class="question-hint" id="questionHint"></div>
    </div>
    <div class="canvas-wrapper">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="drawCanvas"></canvas>
        <svg class="canvas-grid" viewBox="0 0 100 100" preserveAspectRatio="none">
          <line x1="50" y1="0" x2="50" y2="100" stroke="#ffb3d9" stroke-width=".3" stroke-dasharray="2,2"/>
          <line x1="0" y1="50" x2="100" y2="50" stroke="#ffb3d9" stroke-width=".3" stroke-dasharray="2,2"/>
        </svg>
      </div>
      <div class="canvas-actions" id="canvasActions">
        <button class="btn-clear" onclick="clearCanvas()">消す</button>
        <button class="btn-check" onclick="showAnswer()">答え合わせ</button>
      </div>
    </div>
    <div class="answer-panel" id="answerPanel">
      <div class="answer-kanji" id="answerKanji"></div>
      <div class="answer-reading" id="answerReading"></div>
      <div class="answer-detail">
        <h4>意味</h4>
        <p id="answerMeaning"></p>
      </div>
      <div class="answer-detail" id="strokeSection">
        <h4>正解の漢字</h4>
        <div class="stroke-order" id="strokeOrder"></div>
      </div>
      <div class="judge-buttons">
        <button class="btn-wrong" onclick="judgeAnswer(false)">✗ 不正解</button>
        <button class="btn-correct" onclick="judgeAnswer(true)">◯ 正解</button>
      </div>
    </div>
    <div style="height:32px;flex-shrink:0"></div>
  </div>

  <div class="page" id="pageHistory">
    <div class="history-section" id="historyContent"></div>
  </div>

  <div class="page" id="pageStats">
    <div class="stats-overview" id="statsOverview"></div>
    <div class="kanji-stats-list" id="kanjiStatsList"></div>
  </div>

  <div class="page" id="pageSettings">
    <div class="config-section">
      <h3>設定</h3>
      <div class="config-option">
        <label>ペンの太さ</label>
        <select id="penSize" onchange="saveSetting('penSize',this.value)">
          <option value="4">細い</option>
          <option value="6" selected>普通</option>
          <option value="10">太い</option>
        </select>
      </div>
      <div class="config-option">
        <label>ペンの色</label>
        <select id="penColor" onchange="saveSetting('penColor',this.value)">
          <option value="#ffffff">白</option>
          <option value="#ff69b4" selected>ピンク</option>
          <option value="#a78bfa">むらさき</option>
          <option value="#50d4a0">みどり</option>
        </select>
      </div>
      <button class="danger-btn" onclick="if(confirm('全てのデータをリセットしますか？')){localStorage.clear();location.reload();}">
        全データをリセット
      </button>
      <div style="margin-top:24px;padding:16px;background:var(--card2);border-radius:12px;border:1px solid var(--border)">
        <h4 style="font-size:13px;margin-bottom:8px">このアプリについて</h4>
        <p style="font-size:12px;color:var(--text2);line-height:1.6">
          5年生漢字ドリル対応のテストアプリです。<br>
          PDFの問題データを入れ替えることで、別の漢字テストも作成できます。<br>
          データはこの端末のブラウザに保存されます。
        </p>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="active" onclick="showPage('Home')" id="navHome">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
      ホーム

let currentPage = 'Home';
let testMode = 'normal'; // normal, review, review_page, worst
let reviewPageNum = 0;
let testQuestions = [];
let testIndex = 0;
let testResults = [];
let drawing = false;
let ctx, canvas;

// Load persisted data
function loadData(k,d){ try{return JSON.parse(localStorage.getItem(k))||d}catch{return d} }
function saveData(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

let history = loadData('history',[]);
let kanjiStats = loadData('kanjiStats',{});

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
  currentPage = name;
  if(name==='History') renderHistory();
  if(name==='Stats') renderStats();
  if(name==='Home') updateHomeCounts();
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function updateHomeCounts(){
  const isWrong = k => kanjiStats[k].wrong > 0 && (kanjiStats[k].streak || 0) < 3;
  const wrongKeys = Object.keys(kanjiStats).filter(isWrong);
  document.getElementById('reviewCount').textContent = 
    wrongKeys.length > 0 ? `${wrongKeys.length}種類の間違い漢字` : '間違えた問題はまだありません 🎉';
  
  const sorted = wrongKeys.sort((a,b)=>kanjiStats[b].wrong-kanjiStats[a].wrong);
  const topCount = sorted.slice(0,15).length;
  document.getElementById('worstCount').textContent = 
    topCount > 0 ? `最も苦手な${topCount}種類を特訓` : 'まだデータがありません';

  // Per-page review cards
  const container = document.getElementById('perPageReview');
  let html = '<div style="padding:0 16px 4px;font-size:13px;color:#b08aab;font-weight:700">🌸 回ごとの復習</div>';
  let hasAny = false;
  for(let p=1; p<=6; p++){
    const pageWrong = QUESTIONS.filter(q=>q.page===p).filter(q=>{
      const key = q.answer+'_'+q.reading;
      return kanjiStats[key] && isWrong(key);
    });
    if(pageWrong.length > 0){
      hasAny = true;
      html += `<div class="home-card" onclick="openTestSetup('review_page',${p})" style="margin:0 16px 8px;padding:14px 16px">
        <div class="icon red" style="width:36px;height:36px;font-size:16px">🔄</div>
        <div class="info">
          <h3 style="font-size:13px">第${p}回の復習</h3>
          <p>${pageWrong.length}問（3回正解で卒業💮）</p>
        </div>
      </div>`;
    }
  }
  container.style.display = hasAny ? 'block' : 'none';
  if(hasAny) container.innerHTML = html;
}

// ══════════════════════════════════════
// TEST SETUP
// ══════════════════════════════════════
function openTestSetup(mode, pageNum){
  testMode = mode;
  reviewPageNum = pageNum || 0;
  const modal = document.getElementById('testModal');
  const title = document.getElementById('modalTitle');
  const pageArea = document.getElementById('pageSelectArea');
  
  if(mode==='normal'){
    title.textContent='🎀 テスト設定';
    pageArea.style.display='block';
  } else if(mode==='review'){
    title.textContent='💫 間違えた問題を復習';
    pageArea.style.display='none';
  } else if(mode==='review_page'){
    title.textContent=`💫 第${pageNum}回の復習`;
    pageArea.style.display='none';
  } else {
    title.textContent='🌟 苦手な漢字を特訓';
    pageArea.style.display='none';
  }
  modal.classList.add('show');
}
function closeModal(){ document.getElementById('testModal').classList.remove('show'); }

function startTest(){
  closeModal();
  let pool = [];
  const count = parseInt(document.getElementById('questionCount').value);
  const isWrong = k => kanjiStats[k] && kanjiStats[k].wrong > 0 && (kanjiStats[k].streak || 0) < 3;
  
  if(testMode==='normal'){
    const checked = [...document.querySelectorAll('.page-select input:checked')].map(i=>parseInt(i.value));
    if(checked.length===0){ alert('ページを選択してください'); return; }
    pool = QUESTIONS.filter(q=>checked.includes(q.page));
  } else if(testMode==='review'){
    pool = QUESTIONS.filter(q=>{
      const key = q.answer+'_'+q.reading;
      return isWrong(key);
    });
    if(pool.length===0){ alert('間違えた問題がありません 🎉'); return; }
  } else if(testMode==='review_page'){
    pool = QUESTIONS.filter(q=>{
      if(q.page !== reviewPageNum) return false;
      const key = q.answer+'_'+q.reading;
      return isWrong(key);
    });
    if(pool.length===0){ alert('この回の間違い問題はありません 🎉'); return; }
  } else {
    const sorted = Object.entries(kanjiStats)
      .filter(([k,v])=>v.wrong>0 && (v.streak||0)<3)
      .sort((a,b)=>b[1].wrong-a[1].wrong)
      .slice(0,15)
      .map(([k])=>k);
    pool = QUESTIONS.filter(q=>{
      const key = q.answer+'_'+q.reading;
      return sorted.includes(key);
    });
    if(pool.length===0){ alert('苦手な漢字がまだありません'); return; }
  }
  
  // Shuffle
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  
  const n = count===0 ? pool.length : Math.min(count, pool.length);
  testQuestions = pool.slice(0, n);
  testIndex = 0;
  testResults = [];
  
  showPage('Test');
  showQuestion();
}

// ══════════════════════════════════════
// TEST FLOW
// ══════════════════════════════════════
function showQuestion(){
  if(testIndex >= testQuestions.length){
    finishTest();
    return;
  }
  const q = testQuestions[testIndex];
  const total = testQuestions.length;
  
  document.getElementById('progressBar').style.width = ((testIndex/total)*100)+'%';
  document.getElementById('progressCount').textContent = `${testIndex+1}/${total}`;
  document.getElementById('questionLabel').textContent = `第${testIndex+1}問（P${q.page}-${q.num}）`;
  
  // Build sentence with blank
  const sentence = q.sentence.replace(/「([^」]+)」/, '<span class="blank">$1</span>');
  document.getElementById('questionText').innerHTML = sentence;
  document.getElementById('questionHint').textContent = `読み：${q.reading} → 漢字を書いてください`;
  
  // Hide answer
  document.getElementById('answerPanel').classList.remove('show');
  document.getElementById('canvasActions').innerHTML = 
    '<button class="btn-clear" onclick="clearCanvas()">消す</button>'+
    '<button class="btn-check" onclick="showAnswer()">答え合わせ</button>';
  
  requestAnimationFrame(()=>{initCanvas();clearCanvas();});
}

function showAnswer(){
  const q = testQuestions[testIndex];
  const panel = document.getElementById('answerPanel');
  
  document.getElementById('answerKanji').textContent = q.answer;
  document.getElementById('answerKanji').className = 'answer-kanji';
  document.getElementById('answerReading').textContent = `読み：${q.reading}`;
  document.getElementById('answerMeaning').textContent = q.meaning;
  
  // Show each character large
  const chars = q.answer.split('');
  document.getElementById('strokeOrder').textContent = chars.join('　');
  
  panel.classList.add('show');
  
  // Scroll to answer
  panel.scrollIntoView({behavior:'smooth', block:'center'});
  
  // Replace canvas actions
  document.getElementById('canvasActions').innerHTML = '';
}

function judgeAnswer(correct){
  const q = testQuestions[testIndex];
  const key = q.answer+'_'+q.reading;
  
  // Color the answer
  const kanji = document.getElementById('answerKanji');
  kanji.className = 'answer-kanji ' + (correct ? 'correct-color' : 'wrong-color');
  
  // Save result
  testResults.push({question:q, correct});
  
  // Update kanji stats
  if(!kanjiStats[key]) kanjiStats[key] = {correct:0, wrong:0, streak:0, answer:q.answer, reading:q.reading};
  if(correct){
    kanjiStats[key].correct++;
    kanjiStats[key].streak = (kanjiStats[key].streak || 0) + 1;
  } else {
    kanjiStats[key].wrong++;
    kanjiStats[key].streak = 0;
  }
  saveData('kanjiStats', kanjiStats);
  
  // Move to next after brief delay
  setTimeout(()=>{
    testIndex++;
    showQuestion();
  }, 600);
}

function finishTest(){
  const correct = testResults.filter(r=>r.correct).length;
  const total = testResults.length;
  const pct = Math.round((correct/total)*100);
  const now = new Date();
  
  // Save history
  const entry = {
    date: now.toISOString(),
    mode: testMode,
    total,
    correct,
    wrong: total-correct,
    pct,
    results: testResults.map(r=>({
      answer:r.question.answer, reading:r.question.reading,
      page:r.question.page, num:r.question.num, correct:r.correct
    }))
  };
  history.unshift(entry);
  if(history.length>50) history=history.slice(0,50);
  saveData('history', history);
  
  // Show result
  showPage('History');
}

// ══════════════════════════════════════
// CANVAS (Touch Drawing)
// ══════════════════════════════════════
function initCanvas(){
  canvas = document.getElementById('drawCanvas');
  const wrapper = document.querySelector('.canvas-wrapper');
  const w = wrapper.clientWidth - 4;
  const maxH = window.innerWidth >= 600 ? Math.min(w, 400) : w;
  const h = maxH;
  const dpr = window.devicePixelRatio || 2;
  
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = '100%';
  canvas.style.height = Math.round(h)+'px';
  
  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  canvas.ontouchstart = handleTouchStart;
  canvas.ontouchmove = handleTouchMove;
  canvas.ontouchend = handleTouchEnd;
  canvas.onmousedown = handleMouseDown;
  canvas.onmousemove = handleMouseMove;
  canvas.onmouseup = handleMouseUp;
}

function getPos(e, touch){
  const rect = canvas.getBoundingClientRect();
  const clientX = touch ? e.touches[0].clientX : e.clientX;
  const clientY = touch ? e.touches[0].clientY : e.clientY;
  const dpr = window.devicePixelRatio || 2;
  const scaleX = (canvas.width / dpr) / rect.width;
  const scaleY = (canvas.height / dpr) / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;
  return {x,y};
}

function handleTouchStart(e){ e.preventDefault(); const p=getPos(e,true); startDraw(p); }
function handleTouchMove(e){ e.preventDefault(); const p=getPos(e,true); moveDraw(p); }
function handleTouchEnd(e){ e.preventDefault(); endDraw(); }
function handleMouseDown(e){ const p=getPos(e,false); startDraw(p); }
function handleMouseMove(e){ if(!drawing)return; const p=getPos(e,false); moveDraw(p); }
function handleMouseUp(e){ endDraw(); }

function startDraw(p){
  drawing = true;
  const penSize = parseInt(document.getElementById('penSize').value)||6;
  const penColor = document.getElementById('penColor').value||'#f7931e';
  ctx.strokeStyle = penColor;
  ctx.lineWidth = penSize;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}
function moveDraw(p){
  if(!drawing) return;
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}
function endDraw(){ drawing=false; ctx.beginPath(); }

function clearCanvas(){
  if(!ctx||!canvas) return;
  const dpr = window.devicePixelRatio || 2;
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}

// ══════════════════════════════════════
// HISTORY
// ══════════════════════════════════════
function renderHistory(){
  const el = document.getElementById('historyContent');
  if(history.length===0){
    el.innerHTML = '<div class="empty-state"><div class="emoji">📝</div><p>テスト履歴はまだありません<br>ホームからテストを始めよう！</p></div>';
    return;
  }
  
  let html = '<h3>テスト履歴</h3>';
  history.forEach((h,i)=>{
    const d = new Date(h.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const modeLabel = h.mode==='review'?'復習':h.mode==='worst'?'苦手特訓':'通常';
    const scoreClass = h.pct >= 80 ? 'good' : h.pct >= 50 ? '' : 'bad';
    
    html += `<div class="history-item" onclick="showHistoryDetail(${i})">
      <div class="hi-info">
        <h4>${modeLabel}テスト</h4>
        <p>${dateStr}　${h.total}問</p>
      </div>
      <div class="hi-score">
        <div class="score ${scoreClass}">${h.pct}%</div>
        <div class="total">${h.correct}/${h.total}正解</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function showHistoryDetail(idx){
  const h = history[idx];
  let html = `<h3 style="margin-bottom:4px">テスト結果</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:16px">${new Date(h.date).toLocaleString('ja-JP')}</p>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <div class="stat-box" style="flex:1"><div class="stat-num green">${h.correct}</div><div class="stat-label">正解</div></div>
      <div class="stat-box" style="flex:1"><div class="stat-num red">${h.wrong}</div><div class="stat-label">不正解</div></div>
      <div class="stat-box" style="flex:1"><div class="stat-num blue">${h.pct}%</div><div class="stat-label">正解率</div></div>
    </div>`;
  
  h.results.forEach(r=>{
    const icon = r.correct ? '◯' : '✗';
    const color = r.correct ? 'var(--correct)' : 'var(--wrong)';
    html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="color:${color};font-size:18px;width:24px;text-align:center">${icon}</span>
      <span style="font-size:20px;font-weight:700;width:48px">${r.answer}</span>
      <span style="font-size:12px;color:var(--text2)">${r.reading} (P${r.page}-${r.num})</span>
    </div>`;
  });
  
  html += `<button class="btn-clear" style="width:100%;margin-top:16px;padding:12px" onclick="renderHistory()">← 戻る</button>`;
  document.getElementById('historyContent').innerHTML = html;
}

// ══════════════════════════════════════
// STATS
// ══════════════════════════════════════
function renderStats(){
  const entries = Object.entries(kanjiStats);
  const totalCorrect = entries.reduce((s,[k,v])=>s+v.correct,0);
  const totalWrong = entries.reduce((s,[k,v])=>s+v.wrong,0);
  const total = totalCorrect + totalWrong;
  
  document.getElementById('statsOverview').innerHTML = `
    <div class="stat-box"><div class="stat-num blue">${total}</div><div class="stat-label">総回答数</div></div>
    <div class="stat-box"><div class="stat-num green">${totalCorrect}</div><div class="stat-label">正解</div></div>
    <div class="stat-box"><div class="stat-num red">${totalWrong}</div><div class="stat-label">不正解</div></div>`;
  
  // Sort by wrong count descending
  const sorted = entries.sort((a,b)=>b[1].wrong-a[1].wrong);
  
  let html = '';
  if(sorted.length > 0){
    const wrongOnes = sorted.filter(([k,v])=>v.wrong>0);
    if(wrongOnes.length>0){
      html += '<h3>間違いの多い漢字</h3>';
      html += `<button class="review-btn" onclick="openTestSetup('worst')" ${wrongOnes.length===0?'disabled':''}>
        苦手な漢字をまとめてテスト (${Math.min(wrongOnes.length,15)}問)
      </button>`;
      wrongOnes.forEach(([key,stat])=>{
        const total = stat.correct+stat.wrong;
        const pct = Math.round((stat.correct/total)*100);
        const barColor = pct>=80?'var(--correct)':pct>=50?'var(--accent)':'var(--wrong)';
        html += `<div class="kanji-stat-item">
          <div class="ks-kanji">${stat.answer}</div>
          <div class="ks-info">
            <div class="ks-reading">${stat.reading}</div>
            <div class="ks-bar"><div class="ks-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          </div>
          <div class="ks-counts">
            <span class="c-correct">◯${stat.correct}</span> 
            <span class="c-wrong">✗${stat.wrong}</span>
          </div>
        </div>`;
      });
    }
    
    html += '<h3 style="margin-top:20px">全漢字の成績</h3>';
    sorted.forEach(([key,stat])=>{
      const total = stat.correct+stat.wrong;
      const pct = Math.round((stat.correct/total)*100);
      const barColor = pct>=80?'var(--correct)':pct>=50?'var(--accent)':'var(--wrong)';
      html += `<div class="kanji-stat-item">
        <div class="ks-kanji">${stat.answer}</div>
        <div class="ks-info">
          <div class="ks-reading">${stat.reading}</div>
          <div class="ks-bar"><div class="ks-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
        <div class="ks-counts">
          <span class="c-correct">◯${stat.correct}</span> 
          <span class="c-wrong">✗${stat.wrong}</span>
        </div>
      </div>`;
    });
  } else {
    html = '<div class="empty-state"><div class="emoji">📊</div><p>まだテスト結果がありません</p></div>';
  }
  
  document.getElementById('kanjiStatsList').innerHTML = html;
}

function loadSettings(){
  const ps = localStorage.getItem('setting_penSize');
  const pc = localStorage.getItem('setting_penColor');
  if(ps) document.getElementById('penSize').value = ps;
  if(pc) document.getElementById('penColor').value = pc;
}
